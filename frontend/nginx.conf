# Frontend nginx: serves the Angular SPA under /mrm and reverse-proxies the
# app's API/WebSocket sub-paths to the internal backend containers on the
# Docker network. The whole app is reachable at http://<host>/mrm once the
# server's main nginx forwards /mrm/ to this container (see DEPLOYMENT.md).
#
# This file is included inside the http{} block, so `map` is valid here.

# Toggles the Connection header for WebSocket upgrades.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Allow reasonably large document uploads to reach the agents.
    client_max_body_size 32m;

    # gzip for the static bundle
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Container health (used by Docker HEALTHCHECK and uptime checks).
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Bare /mrm -> /mrm/ so relative asset URLs resolve correctly.
    location = /mrm {
        return 301 /mrm/;
    }

    # ---- API fan-out (^~ stops the static-asset regex below from hijacking) ----

    # Reception agent (chat sessions): /mrm/agent/sessions -> reception_agent:8350/sessions
    location ^~ /mrm/agent/ {
        proxy_pass http://reception_agent:8350/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Agent/LLM calls are slow.
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # MRM deep-agent backend: /mrm/mrm-backend/generate -> deep_agent:9090/generate
    location ^~ /mrm/mrm-backend/ {
        proxy_pass http://deep_agent:9090/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Report generation can run for minutes.
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }

    # MCP WebSocket stream: /mrm/ws -> mcp_server:8354/ws (native WebSocket).
    location ^~ /mrm/ws {
        proxy_pass http://mcp_server:8354/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Governance API belongs to a SEPARATE, pre-existing app on this server.
    # Disabled by default. To enable, see the commented block in DEPLOYMENT.md
    # (point it at the existing backend and set GOVERNANCE host/port).
    location ^~ /mrm/governance-api/ {
        return 501;
    }

    # Cache fingerprinted static assets aggressively (outputHashing = all).
    location ~* /mrm/.*\.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any other /mrm/* route returns the app shell (client routing).
    location /mrm/ {
        try_files $uri $uri/ /mrm/index.html;
    }
}
