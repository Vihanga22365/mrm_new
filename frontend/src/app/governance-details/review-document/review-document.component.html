<section
  [class.theme-dark]="isDarkTheme"
  [ngClass]="
    isDarkTheme
      ? 'rounded-2xl border border-slate-700 bg-slate-800/80 p-6'
      : 'rounded-2xl border border-slate-200 bg-white p-6'
  "
>
  <header class="flex items-center gap-3 mb-6">
    <div
      [ngClass]="
        isDarkTheme
          ? 'h-9 w-9 rounded-lg bg-purple-500/20 text-purple-300'
          : 'h-9 w-9 rounded-lg bg-purple-100 text-purple-600'
      "
      class="inline-flex items-center justify-center"
    >
      <svg
        class="w-5 h-5"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M12 20h9" />
        <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
      </svg>
    </div>
    <h2
      [ngClass]="isDarkTheme ? 'text-xl text-white' : 'text-xl text-slate-900'"
      class="font-semibold"
    >
      Review Document
    </h2>
  </header>

  <div
    *ngIf="reviewError"
    [ngClass]="
      isDarkTheme
        ? 'bg-red-500/10 border-red-500/40 text-red-200'
        : 'bg-red-50 border-red-200 text-red-700'
    "
    class="rounded-xl border px-4 py-3 text-sm mb-4"
  >
    {{ reviewError }}
  </div>

  <div
    *ngIf="hasNoComments"
    [ngClass]="
      isDarkTheme
        ? 'bg-slate-900/70 border-slate-700 text-slate-300'
        : 'bg-slate-50 border-slate-200 text-slate-500'
    "
    class="rounded-xl border px-4 py-4 text-sm italic"
  >
    No comments found in the reviewed document.
  </div>

  <div class="space-y-5" *ngIf="comments.length > 0">
    <article
      *ngFor="let item of comments; let index = index"
      [attr.id]="'review-comment-' + index"
      [ngClass]="
        isDarkTheme
          ? 'border border-slate-700 bg-slate-900/80'
          : 'border border-slate-200 bg-white'
      "
      class="rounded-xl p-5"
    >
      <div class="flex items-start gap-3 mb-4">
        <div
          [ngClass]="
            isDarkTheme
              ? 'bg-indigo-500/25 text-indigo-200'
              : 'bg-indigo-100 text-indigo-600'
          "
          class="h-8 w-8 rounded-full inline-flex items-center justify-center text-sm font-bold mt-0.5"
        >
          {{ index + 1 }}
        </div>

        <div class="flex-1 min-w-0">
          <h3
            [ngClass]="isDarkTheme ? 'text-slate-100' : 'text-slate-800'"
            class="text-sm font-semibold"
          >
            Comment from Reviewer
          </h3>
          <p
            [ngClass]="
              isDarkTheme
                ? 'bg-yellow-500/10 border-yellow-500/30 text-yellow-100'
                : 'bg-yellow-50 border-yellow-200 text-slate-800'
            "
            class="mt-1.5 inline-block rounded-md border px-2.5 py-1.5 text-sm font-medium"
          >
            {{ item.comment }}
          </p>
        </div>
      </div>

      <div
        [ngClass]="
          isDarkTheme
            ? 'bg-slate-950 border-slate-700 text-slate-200'
            : 'bg-slate-50 border-slate-200 text-slate-600'
        "
        class="rounded-lg border p-3 text-xs leading-relaxed whitespace-pre-wrap font-mono"
        [innerHTML]="formatReportText(item.report_text)"
      ></div>

      <div
        class="mt-4 pt-4 border-t"
        [ngClass]="isDarkTheme ? 'border-slate-700' : 'border-slate-100'"
      >
        <label
          [ngClass]="isDarkTheme ? 'text-slate-300' : 'text-slate-500'"
          class="block text-xs font-semibold uppercase tracking-wide mb-1"
        >
          Additional Instructions (optional)
        </label>
        <textarea
          [(ngModel)]="item.additionalInstructions"
          rows="2"
          [ngClass]="
            isDarkTheme
              ? 'bg-slate-900 border-slate-700 text-white placeholder:text-slate-500'
              : 'bg-white border-slate-300 text-slate-900 placeholder:text-slate-400'
          "
          class="control-field w-full rounded-lg border px-3 py-2.5 text-sm resize-none"
          placeholder="e.g. Focus on regulatory compliance, be concise, suggest alternative phrasing..."
        ></textarea>

        <button
          type="button"
          (click)="processComment(item, index)"
          [disabled]="item.isProcessing"
          class="mt-3 inline-flex items-center gap-2 rounded-lg bg-slate-900 hover:bg-black disabled:bg-slate-500 disabled:cursor-not-allowed text-white text-sm font-bold px-4 py-2"
        >
          <span *ngIf="item.isProcessing" class="mini-spinner"></span>
          {{ item.actionLabel }}
        </button>

        <div
          *ngIf="item.resultText"
          [attr.id]="'review-comment-result-' + index"
          [ngClass]="
            isDarkTheme
              ? 'bg-indigo-900/25 border-indigo-800 text-slate-100'
              : 'bg-indigo-50 border-indigo-100 text-slate-800'
          "
          class="mt-3 rounded-lg border p-4 text-sm leading-relaxed whitespace-pre-wrap"
        >
          {{ item.resultText }}
        </div>
      </div>
    </article>
  </div>
</section>
