<section
  [ngClass]="
    isDarkTheme
      ? 'bg-slate-900 rounded-3xl h-full flex shadow-xl border border-slate-700 overflow-visible'
      : 'bg-white rounded-3xl h-full flex shadow-xl border border-slate-200 overflow-visible'
  "
  class="relative"
>
  <aside
    [ngClass]="
      isDarkTheme
        ? 'w-72 bg-gradient-to-b from-slate-800 to-slate-900 border-r border-slate-700 p-4 flex flex-col rounded-l-3xl'
        : 'w-72 bg-gradient-to-b from-slate-50 to-slate-100 border-r border-slate-200 p-4 flex flex-col rounded-l-3xl'
    "
  >
    <div class="mb-6">
      <div class="flex items-center justify-between">
        <div>
          <h2
            [ngClass]="
              isDarkTheme
                ? 'text-sm font-semibold text-white uppercase tracking-wider'
                : 'text-sm font-semibold text-slate-900 uppercase tracking-wider'
            "
          >
            Agents
          </h2>
          <p
            [ngClass]="
              isDarkTheme
                ? 'text-xs text-white mt-1'
                : 'text-xs text-slate-500 mt-1'
            "
          >
            Analysis Dashboard
          </p>
        </div>
        <button
          type="button"
          (click)="toggleTheme()"
          [attr.aria-label]="
            isDarkTheme ? 'Switch to light theme' : 'Switch to dark theme'
          "
          [ngClass]="
            isDarkTheme
              ? 'inline-flex items-center justify-center w-8 h-8 rounded-lg bg-slate-700 text-yellow-400 hover:bg-slate-600 hover:scale-105 active:scale-95 transition-all border border-slate-600'
              : 'inline-flex items-center justify-center w-8 h-8 rounded-lg bg-slate-200 text-slate-600 hover:bg-slate-300 hover:scale-105 active:scale-95 transition-all'
          "
        >
          <svg
            *ngIf="!isDarkTheme"
            class="w-4 h-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg
            *ngIf="isDarkTheme"
            class="w-4 h-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </div>

    <nav class="flex-1 space-y-2">
      <button
        type="button"
        (click)="setActiveSection('refine')"
        [ngClass]="
          activeSection === 'refine'
            ? 'bg-blue-600 text-white shadow-sm shadow-blue-500/30'
            : isDarkTheme
              ? 'text-white hover:bg-slate-700 border border-slate-600/60'
              : 'text-slate-700 hover:bg-slate-200 border border-slate-300/80'
        "
        class="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl font-medium text-xs transition-all leading-tight"
      >
        <svg
          class="w-4 h-4 flex-shrink-0"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M12 3l1.9 3.9L18 8.2l-3 2.9.7 4.1-3.7-1.9L8.3 15.2l.7-4.1-3-2.9 4.1-1.3z"
          />
          <path
            d="M19 15l.9 1.8 1.9.6-1.4 1.3.3 1.9-1.7-.9-1.7.9.3-1.9-1.4-1.3 1.9-.6z"
          />
        </svg>
        <span class="text-left">Select Chapter & Refine</span>
      </button>

      <button
        type="button"
        (click)="setActiveSection('review_document')"
        [ngClass]="
          activeSection === 'review_document'
            ? 'bg-blue-600 text-white shadow-sm shadow-blue-500/30'
            : isDarkTheme
              ? 'text-white hover:bg-slate-700 border border-slate-600/60'
              : 'text-slate-700 hover:bg-slate-200 border border-slate-300/80'
        "
        class="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl font-medium text-xs transition-all leading-tight"
      >
        <svg
          class="w-4 h-4 flex-shrink-0"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
        </svg>
        <span class="text-left">Review Document</span>
      </button>
    </nav>
  </aside>

  <main
    [ngClass]="
      isDarkTheme
        ? 'flex-1 flex flex-col relative overflow-visible bg-slate-900 rounded-r-3xl border-l border-slate-700'
        : 'flex-1 flex flex-col relative overflow-visible rounded-r-3xl border-l border-slate-200'
    "
  >
    <div class="flex-1 overflow-y-auto p-6">
      <app-chapter-refine
        [style.display]="activeSection === 'refine' ? 'block' : 'none'"
        [isDarkTheme]="isDarkTheme"
        [chapterOptions]="chapterOptions"
      />

      <app-review-document
        [style.display]="activeSection === 'review_document' ? 'block' : 'none'"
        [isDarkTheme]="isDarkTheme"
        [reviewResponse]="reviewDocumentResponse"
        [automationTask]="reviewDocumentTask"
        [automationSubSection]="reviewDocumentSubSection"
        [automationNonce]="reviewDocumentTaskNonce"
      />
    </div>
  </main>
</section>
